name: Daily Improve

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Run Daily Improve Script
        run: npm run daily:improve

      - name: Commit and Push Changes
        run: |
          git config --global user.name "thangamariappan19"
          git config --global user.email "thangamariappancse@gmail.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Check if commit_message.txt exists, otherwise use default
            if [ -f commit_message.txt ]; then
              git commit -F commit_message.txt
              rm commit_message.txt
            else
              git commit -m "chore: daily improvement $(date +'%Y-%m-%d')"
            fi
            git push
          fi
