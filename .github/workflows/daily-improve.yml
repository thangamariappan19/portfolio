name: Daily Code Improvements

on:
  schedule:
    - cron: '0 9 * * *' # 9 AM UTC daily — one run, three real commits
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "Thanga Mariappan"
          git config user.email "thangamariappancse@gmail.com"

      - name: Apply daily improvements
        run: node scripts/daily-code-improve.js

      - name: Push
        run: git push
